version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: dream_journal_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dream_journal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dream_journal"]
      interval: 5s
      timeout: 5s
      retries: 5

  fastapi_dream_app:
    image: dreamy-image
    container_name: dreamy-container
    build: .
    restart: always
    ports:
      - "8000:8000"
    environment:
      # Ensure your FastAPI is configured for reverse proxy
      - PROXY_HEADERS=1
      - SERVER_HOST=0.0.0.0
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
